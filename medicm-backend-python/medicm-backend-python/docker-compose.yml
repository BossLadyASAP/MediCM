version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret}
      - DATABASE_URL=mysql+pymysql://medicm:medicm_password@mysql:3306/medicm
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      - mysql
    volumes:
      - ./uploads:/app/uploads
    networks:
      - medicm-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=medicm
      - MYSQL_USER=medicm
      - MYSQL_PASSWORD=medicm_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - medicm-network

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=medicm
      - PMA_PASSWORD=medicm_password
    depends_on:
      - mysql
    networks:
      - medicm-network

volumes:
  mysql_data:

networks:
  medicm-network:
    driver: bridge
